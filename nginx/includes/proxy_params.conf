# ============================================
# Proxy Parameters
# 共通プロキシヘッダー設定
# ============================================

# 基本ヘッダー
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;
proxy_set_header X-Original-URI $request_uri;

# リクエストトレーシング
proxy_set_header X-Request-ID $request_id;
proxy_set_header X-Request-Start $msec;

# WebSocket対応 & Keep-Alive
# WebSocket: Connection "upgrade" / 通常: Connection "" (Keep-Alive)
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
proxy_redirect off;

# Proxy timeouts
proxy_connect_timeout 10s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;

# アップストリームのサーバー情報ヘッダーを除去
proxy_hide_header X-Powered-By;
proxy_hide_header Server;

# upstream が独自に返すセキュリティヘッダーを隠し、ゲートウェイの値に一本化する。
# 値が矛盾したまま重複すると、ブラウザが不正としてヘッダーごと無視することがある。
# （例: Django は X-Frame-Options: DENY / Referrer-Policy: same-origin を返すが、
#   ゲートウェイは SAMEORIGIN / strict-origin-when-cross-origin を付ける）
#
# 注意: proxy_hide_header は「下位レベルに1つでもあれば上位レベルは全て無効」。
# location 側で追加で隠したいヘッダーがある場合は、ここの4行も再掲すること。
proxy_hide_header X-Frame-Options;
proxy_hide_header X-Content-Type-Options;
proxy_hide_header Referrer-Policy;
proxy_hide_header Permissions-Policy;

# Content-Security-Policy は意図的に隠さない。複数の CSP は積集合で適用され、
# アプリ側の CSP（script-src 等）とゲートウェイ側の CSP（frame-ancestors 等）が
# 相互補完になるため。詳細は security_headers.conf のコメント参照。
