# ============================================
# WebSocket Upgrade Map
# ============================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' '';
}

# ============================================
# Host ヘッダーの許可判定
# ============================================
# ゲートウェイは 0.0.0.0:80 で LAN に公開されており、Host は
# proxy_set_header Host $host で各アプリへ素通しされる（アプリ側は
# 絶対URL・リダイレクト生成に利用する）。任意の Host を受け入れると
# DNS リバインディングや Host 由来のリンク汚染の余地が残るため、
# 「社内から到達しうる名前」だけを許可する。
#
# 許可:
#   - localhost / ループバック
#   - RFC1918 のプライベート IP リテラル（LAN の <ホストPCのIP> 直打ち）
#   - ドットを含まない単一ラベル名（Windows のマシン名・NetBIOS 名）
#   - .local / .lan / .internal / .home.arpa（社内向けドメイン）
# 拒否（444 = 応答せず切断）:
#   - 上記以外の FQDN。外部ドメインを LAN の IP に向けた誘導を弾く。
#
# 社内で独自ドメインを使う場合はここに1行足すこと。
map $host $host_allowed {
    default 0;

    localhost 1;
    ~^127\.\d+\.\d+\.\d+$ 1;
    "[::1]" 1;

    ~^10\.\d+\.\d+\.\d+$ 1;
    ~^192\.168\.\d+\.\d+$ 1;
    ~^172\.(1[6-9]|2\d|3[01])\.\d+\.\d+$ 1;

    ~^[a-z0-9][a-z0-9-]*$ 1;
    ~\.(local|lan|internal)$ 1;
    ~\.home\.arpa$ 1;
}

# ============================================
# Next.js Font Routing (Turbopack dev mode)
# ============================================
# 本番では使われない dev 専用ルート。Referer からアプリを判別するという
# 特殊な引き方のため、$app_backend レジストリではなくここで直接指定する。
map $http_referer $nextjs_font_backend {
    default portal-app:3000;
    ~*/itcm/ itcm-frontend:3020;
    ~*/medical/ medical-stock-valuation:3010;
    ~*/insurance/ insurance-app:3030;
    ~*/private-banking/ private-banking-app:3025;
}
