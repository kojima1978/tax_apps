# ============================================
# アップストリーム・レジストリ（アドレスの唯一の情報源）
# ============================================
#
# 動的DNS解決（resolver + 変数）を使用するため upstream ブロックは定義せず、
# 「アプリ名 -> ホスト名:ポート」の対応表を map で持つ。
# nginx は起動時にホスト名を解決せず、リクエスト時に解決する。
#
# ホスト名:ポートを書いてよいのはこのファイルだけ。default.conf 側は
# アプリ名（$app_name）だけを扱い、アドレスは $app_backend 経由で引く。
# ポート変更時の修正は、ここ1行で済む。
#
# $app_name は次のいずれかで決まる:
#   - URL の第1セグメント（正規表現 location の名前付きキャプチャ）
#   - location 内の `set $app_name xxx;`（個別設定の location）
#
# 【重要】map は1リクエスト内で最初に参照された時点の値がキャッシュされる。
# `set $app_name ...` は必ず $app_backend を参照する前に置くこと。
#
# キーは URL の第1セグメントと一致させる。ここに登録するだけで
# 「/xxx -> /xxx/ の末尾スラッシュ正規化」も自動で有効になる（default.conf）。
#
# default が空文字なのは意図的:
#   - 未登録アプリへの proxy_pass を失敗させ、誤ったアプリへの転送を防ぐ
#   - 末尾スラッシュ正規化の「登録済みアプリか」判定に使う
map $app_name $app_backend {
    default "";

    tax-docs             tax-docs:3002;                # 所得税・贈与税書類リスト (Vite)
    gift-tax-simulator   gift-tax-simulator:3001;      # 贈与税計算シミュレーター (Vite)
    inheritance-tax-docs inheritance-tax-docs:3003;    # 相続税申告 資料準備ガイド (Vite + Express)
    inheritance-tax-app  inheritance-tax-app:3004;     # 相続税シミュレーター (Vite)
    retirement-tax-calc  retirement-tax-calc:3013;     # 退職金税額計算 (Vite)
    stock-valuation-form stock-valuation-form:3014;    # 株式評価明細書 (Vite)
    depreciation-calc    depreciation-calc:3015;       # 減価償却計算 (Vite)
    asset-valuation      asset-valuation:3017;         # 減価償却資産評価 (Vite)
    income-tax-calc      income-tax-calc:3018;         # 所得税計算 (Vite)

    itcm                 itcm-frontend:3020;           # 相続税案件管理 (Next.js)
    medical              medical-stock-valuation:3010; # 医療法人株式評価 (Next.js)
    insurance            insurance-app:3030;           # 保険管理 (Next.js)
    private-banking      private-banking-app:3025;     # ファミリーB/S管理 (Next.js)

    bank-analyzer        bank-analyzer:3007;           # 銀行分析システム (Django)
}

# ポータルは URL プレフィックスを持たない（`/` 直下）ため上の表には入れず、
# 定数として定義する。map のキーに $host を使っているが値は常に同じで、
# nginx に「定数」構文が無いための書き方。
map $host $portal_backend {
    default portal-app:3000;
}

# ============================================
# 新しいアプリを追加する場合
# ============================================
#
#   1. 上の $app_backend に1行追加（アドレスを書くのはここだけ）
#   2. default.conf の該当する「振る舞いクラス」の正規表現にアプリ名を追加
#      - Vite SPA            -> Vite 一括 location の正規表現
#      - basePath 付き Next.js -> _next/static の正規表現
#      - 個別設定が必要        -> location を作り `set $app_name xxx;` を書く
#   3. （Next.js のフォント対応が必要な場合）maps.conf の
#      $nextjs_font_backend に追加
#
# 末尾スラッシュの正規化とアドレス解決は 1 だけで自動的に効く。
#
# ============================================
