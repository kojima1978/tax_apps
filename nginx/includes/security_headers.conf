# ============================================
# Security Headers
# 共通セキュリティヘッダー
# ============================================
#
# 注意: nginx の add_header は「現在のレベルに add_header が
# 1つでもあれば親レベルの add_header はすべて無効」になる。
# 独自の add_header（Cache-Control など）を持つ location では
# この include を再掲してヘッダー欠落を防ぐこと。
#
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# CSP は「Next.js / Vite を壊さない指令だけ」を有効にしている。
#   frame-ancestors : X-Frame-Options の後継。iframe 埋め込みを同一オリジンに限定
#   base-uri        : <base> 書き換えによる相対URL乗っ取りを防止
#   object-src      : <object>/<embed> によるプラグイン実行を禁止
#   form-action     : フォームの外部送信を禁止
#
# script-src / style-src は意図的に入れていない。Next.js も Vite も
# インラインスクリプト・インラインスタイルを多用するため、'unsafe-inline'
# なしでは全アプリが即座に壊れる。導入するならアプリ側で nonce を発行し、
# アプリごとに段階的に有効化すること（ゲートウェイ一括では不可）。
#
# 【重要】他の4ヘッダーと違い、CSP は proxy_hide_header で upstream 側を
# 消してはいけない。一部の Vite アプリ（tax-docs, gift-tax-simulator,
# retirement-tax-calc, depreciation-calc, income-tax-calc）は自前で
# `default-src 'self'` + Google Fonts 許可の CSP を返しており、こちらより
# 強い。CSP ヘッダーが複数ある場合はブラウザが全てを積集合で適用するため、
# 「アプリ = script/style/font/img」「ゲートウェイ = frame-ancestors /
# base-uri / object-src / form-action」の相互補完として正しく機能する。
# 重複を"整理"して upstream 側を消すと防御が弱くなるので注意。
add_header Content-Security-Policy "frame-ancestors 'self'; base-uri 'self'; object-src 'none'; form-action 'self'" always;
