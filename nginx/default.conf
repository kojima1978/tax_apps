# ============================================
# Tax Apps - Gateway server routing
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost _;

    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    limit_conn conn_limit 50;

    proxy_http_version 1.1;
    include /etc/nginx/includes/proxy_params.conf;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_buffering on;
    proxy_request_buffering on;
    proxy_max_temp_file_size 128m;

    proxy_intercept_errors on;
    # 各サービスは単一コンテナのため http_5xx の再試行は無効（同一サーバへの無駄な再送と
    # 非冪等メソッドの二重実行を避ける）。接続失敗・タイムアウトのみ自動リカバリ対象。
    proxy_next_upstream error timeout;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 15s;

    # Hashed Next.js static assets can be cached aggressively.
    location ~* ^/_next/static/.*$ {
        set $upstream_portal portal-app:3000;
        proxy_pass http://$upstream_portal;
        proxy_cache static_cache;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/includes/security_headers.conf;
        access_log off;
    }

    # Next.js font route used by Turbopack development mode.
    location /__nextjs_font/ {
        proxy_pass http://$nextjs_font_backend;
    }

    # Liveness: only checks that Nginx can serve requests.
    location = /health {
        access_log off;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 'OK';
    }

    # Readiness: checks that the default portal upstream is reachable.
    location = /ready {
        access_log off;
        set $upstream_portal_ready portal-app:3000;
        proxy_method HEAD;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_connect_timeout 2s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;
        proxy_intercept_errors off;
        proxy_pass http://$upstream_portal_ready;
    }

    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Allow Vite dev optimized dependency chunks under node_modules/.vite/.
    location ~ /\.(?!well-known(?:/|$)|vite(?:/|$)) {
        access_log off;
        return 404;
    }

    # 末尾スラッシュ無しのアプリルートを正規化（例: /itcm -> /itcm/）。
    # これが無いと location /itcm/ にマッチせず location / (portal) に落ちて 404 になる。
    location ~ ^/(tax-docs|medical|insurance|inheritance-tax-app|inheritance-tax-docs|gift-tax-simulator|retirement-tax-calc|depreciation-calc|asset-valuation|stock-valuation-form|income-tax-calc|bank-analyzer)$ {
        return 301 $uri/$is_args$args;
    }

    # Portal
    location / {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_portal portal-app:3000;
        proxy_pass http://$upstream_portal;
    }

    # Tax docs (Vite)
    location /tax-docs/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_tax_docs tax-docs:3002;
        proxy_pass http://$upstream_tax_docs;
        proxy_read_timeout 86400;
    }

    # Inheritance case management (Next.js)
    location = /itcm {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_itcm_root itcm-frontend:3020;
        proxy_pass http://$upstream_itcm_root;
    }

    location /itcm/api-v1/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $upstream_itcm_api_v1 itcm-frontend:3020;
        rewrite ^/itcm/api-v1(.+?)/?$ /itcm/api$1 break;
        proxy_pass http://$upstream_itcm_api_v1;
        proxy_intercept_errors off;
    }

    location /itcm/api/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $upstream_itcm_api itcm-frontend:3020;
        rewrite ^(.+)/$ $1 break;
        proxy_pass http://$upstream_itcm_api;
        proxy_intercept_errors off;
    }

    location /itcm/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_itcm itcm-frontend:3020;
        proxy_pass http://$upstream_itcm;
    }

    # Medical stock valuation (Next.js)
    location /medical/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_medical medical-stock-valuation:3010;
        proxy_pass http://$upstream_medical;
    }

    # Insurance management (Next.js)
    location /insurance/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_insurance insurance-app:3030;
        proxy_pass http://$upstream_insurance;
    }

    # Inheritance tax calculator (Vite)
    location /inheritance-tax-app/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_ita inheritance-tax-app:3004;
        proxy_pass http://$upstream_ita;
        proxy_read_timeout 86400;
    }

    # Inheritance tax docs (Vite)
    location /inheritance-tax-docs/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_itd inheritance-tax-docs:3003;
        proxy_pass http://$upstream_itd;
        proxy_read_timeout 86400;
    }

    # Gift tax simulator (Vite)
    location /gift-tax-simulator/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_gts gift-tax-simulator:3001;
        proxy_pass http://$upstream_gts;
        proxy_read_timeout 86400;
    }

    # Retirement tax calculator (Vite)
    location /retirement-tax-calc/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_rtc retirement-tax-calc:3013;
        proxy_pass http://$upstream_rtc;
        proxy_read_timeout 86400;
    }

    # Depreciation calculator (Vite)
    location /depreciation-calc/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_ual depreciation-calc:3015;
        proxy_pass http://$upstream_ual;
        proxy_read_timeout 86400;
    }

    # Bank analyzer (Django + Gunicorn)
    location /bank-analyzer/api/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $upstream_bank_api bank-analyzer:3007;
        rewrite ^/bank-analyzer/(.*) /$1 break;
        proxy_pass http://$upstream_bank_api;
        proxy_intercept_errors off;
        proxy_read_timeout 120s;
    }

    location /bank-analyzer/static/ {
        set $upstream_bank_static bank-analyzer:3007;
        rewrite ^/bank-analyzer/(.*) /$1 break;
        proxy_pass http://$upstream_bank_static;
        proxy_cache static_cache;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        include /etc/nginx/includes/security_headers.conf;
        access_log off;
    }

    location /bank-analyzer/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_bank bank-analyzer:3007;
        rewrite ^/bank-analyzer/(.*) /$1 break;
        proxy_pass http://$upstream_bank;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
        # 大容量CSVを tmpfs にバッファせず upstream へ直接ストリームする（/tmp 枯渇・OOM 回避）。
        proxy_request_buffering off;
    }

    # Asset valuation (Vite)
    location /asset-valuation/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_av asset-valuation:3017;
        proxy_pass http://$upstream_av;
        proxy_read_timeout 86400;
    }

    # Stock valuation form (Vite)
    location /stock-valuation-form/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_svf stock-valuation-form:3014;
        proxy_pass http://$upstream_svf;
        proxy_read_timeout 86400;
    }

    # Income tax calculator (Vite)
    location /income-tax-calc/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $upstream_itc income-tax-calc:3018;
        proxy_pass http://$upstream_itc;
        proxy_read_timeout 86400;
    }

    location /gift-tax-docs/ {
        return 301 /tax-docs/;
    }

    location /real-estate-tax/ {
        return 301 /gift-tax-simulator/real-estate;
    }

    location = /error-common.css {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        include /etc/nginx/includes/security_headers.conf;
    }

    error_page 500 502 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 503 /503.html;
    location = /503.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 429 /429.html;
    location = /429.html {
        root /usr/share/nginx/html;
        add_header Retry-After "30" always;
        include /etc/nginx/includes/security_headers.conf;
        internal;
    }
}
