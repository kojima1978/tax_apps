# ============================================
# Tax Apps - Gateway server routing
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost _;

    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # 許可外の Host は応答せず切断（maps.conf の $host_allowed 参照）。
    # ヘルスチェックは 127.0.0.1 で叩くため影響しない。
    if ($host_allowed = 0) {
        return 444;
    }

    limit_conn conn_limit 50;

    proxy_http_version 1.1;
    include /etc/nginx/includes/proxy_params.conf;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_buffering on;
    proxy_request_buffering on;
    proxy_max_temp_file_size 128m;

    proxy_intercept_errors on;
    # 各サービスは単一コンテナのため http_5xx の再試行は無効（同一サーバへの無駄な再送と
    # 非冪等メソッドの二重実行を避ける）。接続失敗・タイムアウトのみ自動リカバリ対象。
    proxy_next_upstream error timeout;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 15s;

    # Hashed Next.js static assets can be cached aggressively.（ポータル）
    location ~* ^/_next/static/.*$ {
        proxy_pass http://$portal_backend;
        proxy_cache static_cache;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        # ゲートウェイ側 TTL は proxy_cache_path の inactive=30d を超えても
        # 到達しないため 30d に揃える（ブラウザ側はハッシュ済みなので 1 年）。
        proxy_cache_valid 200 30d;
        # Next.js も同じ Cache-Control を返すため、重複ヘッダーを避けて上書きする。
        # proxy_hide_header はこのレベルに1つでもあると proxy_params.conf 側の
        # 指定が全て無効になるため、あちらの4行もここに再掲する。
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/includes/security_headers.conf;
        access_log off;
    }

    # basePath 付き Next.js アプリのハッシュ済み静的アセット。
    # location /itcm/ 等（prefix）より正規表現が優先されるため、この位置で捕まえる。
    # アプリ名を第1セグメントから取り、アドレスは upstreams.conf の
    # $app_backend レジストリで解決する（ここにホスト名:ポートは書かない）。
    location ~* ^/(?<app_name>itcm|medical|insurance|private-banking)/_next/static/ {
        proxy_pass http://$app_backend;
        proxy_cache static_cache;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 30d;
        # Next.js も同じ Cache-Control を返すため、重複ヘッダーを避けて上書きする。
        # proxy_hide_header はこのレベルに1つでもあると proxy_params.conf 側の
        # 指定が全て無効になるため、あちらの4行もここに再掲する。
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/includes/security_headers.conf;
        access_log off;
    }

    # Next.js font route used by Turbopack development mode.
    # 本番（standalone build）では使われない dev 専用ルート。
    location /__nextjs_font/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        proxy_pass http://$nextjs_font_backend;
    }

    # Liveness: only checks that Nginx can serve requests.
    location = /health {
        access_log off;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        # この location に add_header がある時点で http レベルの add_header は
        # 全て無効化されるため、security_headers を再 include する。
        include /etc/nginx/includes/security_headers.conf;
        return 200 'OK';
    }

    # Readiness: checks that the default portal upstream is reachable.
    location = /ready {
        access_log off;
        proxy_method HEAD;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_connect_timeout 2s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;
        proxy_intercept_errors off;
        proxy_pass http://$portal_backend;
    }

    # 完全一致にしているのは、下の「単一セグメント」正規表現 location に
    # 横取りされないようにするため（正規表現は前方一致より優先される）。
    location = /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Allow Vite dev optimized dependency chunks under node_modules/.vite/.
    location ~ /\.(?!well-known(?:/|$)|vite(?:/|$)) {
        access_log off;
        return 404;
    }

    # 単一セグメントのパス（例: /itcm, /medical, /about）をここで処理する。
    #
    #   - upstreams.conf のレジストリに登録済みのアプリ名なら
    #     末尾スラッシュへ 301（これが無いと location /xxx/ にマッチせず
    #     location / = ポータルに落ちて 404 になる）
    #   - それ以外はポータルへ素通し
    #
    # アプリ名を列挙せずレジストリ登録の有無で判定するため、アプリ追加時に
    # ここを修正する必要はない。
    #
    # 注意: この正規表現は前方一致 location より優先される。単一セグメントで
    # 個別処理したいパス（/health, /ready, /nginx-status, 旧URL互換など）は
    # すべて `location =` の完全一致で定義してあるため横取りされない。
    location ~ ^/(?<app_name>[a-z0-9][a-z0-9-]*)$ {
        include /etc/nginx/includes/rate_limit_general.conf;

        if ($app_backend) {
            return 301 $uri/$is_args$args;
        }

        # 未登録 = ポータルのページ。$app_backend は上の if で評価済み
        # （map の値はリクエスト内でキャッシュされる）ため再利用できず、
        # ポータル専用の $portal_backend を使う。
        proxy_pass http://$portal_backend;
    }

    # Portal
    location / {
        include /etc/nginx/includes/rate_limit_general.conf;

        proxy_pass http://$portal_backend;
    }

    # ------------------------------------------------------------------
    # Vite SPA アプリ（設定が同一のものをまとめて処理）
    # ここに並ぶのは「振る舞いクラス」としてのアプリ名のみ。アドレスは
    # upstreams.conf の $app_backend レジストリで解決する。
    # read_timeout 86400 は dev モードの HMR (WebSocket) を切らないため。
    #
    # 注意: 正規表現 location は前方一致 location より優先されるため、
    # 個別扱いが必要なパス（例: /inheritance-tax-docs/api/）は `^~` を
    # 付けてこの正規表現より前に確定させること。
    # ------------------------------------------------------------------
    location ~ ^/(?<app_name>tax-docs|gift-tax-simulator|inheritance-tax-docs|inheritance-tax-app|retirement-tax-calc|stock-valuation-form|depreciation-calc|asset-valuation|income-tax-calc)/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        proxy_pass http://$app_backend;
        proxy_read_timeout 86400;
    }

    # Inheritance case management (Next.js)
    location = /itcm {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $app_name itcm;
        proxy_pass http://$app_backend;
    }

    location /itcm/api-v1/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $app_name itcm;
        rewrite ^/itcm/api-v1(.+?)/?$ /itcm/api$1 break;
        proxy_pass http://$app_backend;
        proxy_intercept_errors off;
    }

    location /itcm/api/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $app_name itcm;
        rewrite ^(.+)/$ $1 break;
        proxy_pass http://$app_backend;
        proxy_intercept_errors off;
    }

    location /itcm/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $app_name itcm;
        proxy_pass http://$app_backend;
    }

    # Medical stock valuation (Next.js)
    # API（Route Handlers）は JSON をそのまま返す必要があるため
    # proxy_intercept_errors off（HTML エラーページへの差し替えを止める）。
    location /medical/api/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $app_name medical;
        proxy_pass http://$app_backend;
        proxy_intercept_errors off;
    }

    location /medical/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $app_name medical;
        proxy_pass http://$app_backend;
    }

    # Insurance management (Next.js)
    location /insurance/api/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $app_name insurance;
        proxy_pass http://$app_backend;
        proxy_intercept_errors off;
        # app-state のインポート/バックアップは処理が長引くことがある。
        proxy_read_timeout 120s;
    }

    location /insurance/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $app_name insurance;
        proxy_pass http://$app_backend;
    }

    # Private banking family balance sheet (Next.js)
    # Next.js canonicalizes the basePath root without a trailing slash, so the
    # exact location prevents nginx from redirecting it back to the slash form.
    location = /private-banking {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $app_name private-banking;
        proxy_pass http://$app_backend;
    }

    location /private-banking/api/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $app_name private-banking;
        proxy_pass http://$app_backend;
        proxy_intercept_errors off;
        # positions/bulk・inheritance-export は件数次第で時間がかかる。
        proxy_read_timeout 120s;
    }

    location /private-banking/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $app_name private-banking;
        proxy_pass http://$app_backend;
        proxy_read_timeout 60s;
    }

    # Inheritance tax docs (Vite + Express)
    # 資料ファイルのアップロード（multipart）を含むため body 上限を明示。
    # `^~` = Vite 一括処理の正規表現 location に奪われないようにする。
    location ^~ /inheritance-tax-docs/api/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $app_name inheritance-tax-docs;
        proxy_pass http://$app_backend;
        proxy_intercept_errors off;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Bank analyzer (Django + Gunicorn)
    location /bank-analyzer/api/ {
        include /etc/nginx/includes/rate_limit_api.conf;

        set $app_name bank-analyzer;
        rewrite ^/bank-analyzer/(.*) /$1 break;
        proxy_pass http://$app_backend;
        proxy_intercept_errors off;
        proxy_read_timeout 120s;
    }

    # Django 側は ScriptNameStaticFilesStorage（= StaticFilesStorage 継承）のため
    # ファイル名にハッシュが付かず、キャッシュバスターが存在しない。
    # WhiteNoise は `Cache-Control: max-age=0, public` + ETag/Last-Modified を返し、
    # 「毎回再検証（304 で軽量化）」を意図している。この指示をそのまま通す。
    #
    # 旧設定は proxy_cache_valid 7d + add_header max-age=604800 だったが、
    #   - proxy_cache は upstream の max-age=0 が優先されるため元々効いていなかった
    #   - add_header は upstream の値と重複し、ブラウザ側の挙動が不定だった
    # ため撤去した。長期キャッシュしたい場合は先に Django を
    # ManifestStaticFilesStorage 系（ファイル名ハッシュ）に切り替えること。
    location /bank-analyzer/static/ {
        set $app_name bank-analyzer;
        rewrite ^/bank-analyzer/(.*) /$1 break;
        proxy_pass http://$app_backend;
        access_log off;
    }

    location /bank-analyzer/ {
        include /etc/nginx/includes/rate_limit_general.conf;

        set $app_name bank-analyzer;
        rewrite ^/bank-analyzer/(.*) /$1 break;
        proxy_pass http://$app_backend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
        # 大容量CSVを tmpfs にバッファせず upstream へ直接ストリームする（/tmp 枯渇・OOM 回避）。
        proxy_request_buffering off;
    }

    # 旧URL互換。スラッシュ無しも直接飛ばす（正規化 301 を挟まず 1 ホップにする）。
    location = /gift-tax-docs {
        return 301 /tax-docs/;
    }

    location /gift-tax-docs/ {
        return 301 /tax-docs/;
    }

    location = /real-estate-tax {
        return 301 /gift-tax-simulator/real-estate;
    }

    location /real-estate-tax/ {
        return 301 /gift-tax-simulator/real-estate;
    }

    location = /error-common.css {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        include /etc/nginx/includes/security_headers.conf;
    }

    error_page 500 502 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 503 /503.html;
    location = /503.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 429 /429.html;
    location = /429.html {
        root /usr/share/nginx/html;
        add_header Retry-After "30" always;
        include /etc/nginx/includes/security_headers.conf;
        internal;
    }
}
