<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンテナンス中です - Tax Apps</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/error-common.css">
</head>
<body class="accent-maintenance">
    <main class="card" role="alert" aria-labelledby="page-title">
        <header class="brand">
            <div class="brand-mark" aria-label="Tax Apps">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 5h16"/>
                    <path d="M6 9h12"/>
                    <path d="M8 13h8"/>
                    <path d="M10 17h4"/>
                </svg>
                <span>Tax Apps</span>
            </div>
            <span class="status-chip">Maintenance</span>
        </header>

        <section class="hero-row">
            <div class="icon-wrap" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.1-3.1a6 6 0 0 1-7.8 7.8L7 20l-3-3 6-6a6 6 0 0 1 7.8-7.8Z"/>
                </svg>
            </div>
            <div>
                <p class="code">Error 503</p>
                <h1 id="page-title">メンテナンス中です</h1>
                <p class="lead">現在、システムの更新または保守作業を行っています。ご不便をおかけしますが、しばらく時間をおいて再度アクセスしてください。</p>
            </div>
        </section>

        <div class="notice">
            <span class="pulse-dot" aria-hidden="true"></span>
            <span>サービス再開後は、このページを再読み込みすると通常どおり利用できます。</span>
        </div>

        <div class="actions" aria-label="操作">
            <button type="button" class="btn btn-primary" onclick="location.reload()">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 0-15.2-6.5L3 8"/>
                    <path d="M3 3v5h5"/>
                    <path d="M3 12a9 9 0 0 0 15.2 6.5L21 16"/>
                    <path d="M16 16h5v5"/>
                </svg>
                再読み込み
            </button>
        </div>
    </main>
</body>
</html>
