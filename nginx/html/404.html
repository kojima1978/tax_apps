<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページが見つかりません - Tax Apps</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/error-common.css">
</head>
<body class="accent-not-found">
    <main class="card" role="alert" aria-labelledby="page-title">
        <header class="brand">
            <div class="brand-mark" aria-label="Tax Apps">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 5h16"/>
                    <path d="M6 9h12"/>
                    <path d="M8 13h8"/>
                    <path d="M10 17h4"/>
                </svg>
                <span>Tax Apps</span>
            </div>
            <span class="status-chip">Not Found</span>
        </header>

        <section class="hero-row">
            <div class="icon-wrap" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.3-4.3"/>
                    <path d="M8 11h6"/>
                </svg>
            </div>
            <div>
                <p class="code">Error 404</p>
                <h1 id="page-title">ページが見つかりません</h1>
                <p class="lead">指定されたページは移動または削除された可能性があります。URLをご確認いただくか、トップページから目的のアプリを選択してください。</p>
            </div>
        </section>

        <div class="actions" aria-label="操作">
            <a href="/" class="btn btn-primary">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 10 9-7 9 7"/>
                    <path d="M5 10v10h14V10"/>
                    <path d="M9 20v-6h6v6"/>
                </svg>
                トップへ戻る
            </a>
            <button type="button" class="btn btn-ghost" onclick="history.back()">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m12 19-7-7 7-7"/>
                    <path d="M19 12H5"/>
                </svg>
                前のページへ
            </button>
        </div>
    </main>
</body>
</html>
