<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アクセスが集中しています - Tax Apps</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/error-common.css">
</head>
<body class="accent-rate-limit">
    <main class="card" role="alert" aria-labelledby="page-title">
        <header class="brand">
            <div class="brand-mark" aria-label="Tax Apps">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 5h16"/>
                    <path d="M6 9h12"/>
                    <path d="M8 13h8"/>
                    <path d="M10 17h4"/>
                </svg>
                <span>Tax Apps</span>
            </div>
            <span class="status-chip">Rate Limited</span>
        </header>

        <section class="hero-row">
            <div class="icon-wrap" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <div>
                <p class="code">Error 429</p>
                <h1 id="page-title">アクセスが集中しています</h1>
                <p class="lead">短時間に多くのリクエストが送信されたため、一時的にアクセスを制限しています。少し時間をおいてから再度お試しください。</p>
            </div>
        </section>

        <div class="notice">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 8v4"/>
                <path d="M12 16h.01"/>
                <circle cx="12" cy="12" r="10"/>
            </svg>
            <span>しばらく待ってから再読み込みしてください。処理中の操作は連続して送信しないようご注意ください。</span>
        </div>

        <div class="actions" aria-label="操作">
            <button type="button" class="btn btn-primary" onclick="location.reload()">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 0 0-15.2-6.5L3 8"/>
                    <path d="M3 3v5h5"/>
                    <path d="M3 12a9 9 0 0 0 15.2 6.5L21 16"/>
                    <path d="M16 16h5v5"/>
                </svg>
                再読み込み
            </button>
            <a href="/" class="btn btn-ghost">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 10 9-7 9 7"/>
                    <path d="M5 10v10h14V10"/>
                    <path d="M9 20v-6h6v6"/>
                </svg>
                トップへ戻る
            </a>
        </div>
    </main>
</body>
</html>
