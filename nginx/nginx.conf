# ============================================
# Nginx Gateway Configuration
# Tax Apps Reverse Proxy
# ============================================
#
# Features:
#   - Reverse proxy for Tax Apps services
#   - Rate limiting (API: 60r/s, General: 300r/s)
#   - Gzip compression
#   - Security headers
#   - WebSocket support
#   - Detailed logging with upstream timing
#   - Read-only container runtime support
#
# ============================================

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;
worker_shutdown_timeout 10s;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    # このゲートウェイがエッジ（前段に信頼プロキシが居ない）構成のため、real_ip は使わない。
    # クライアントの実IP（$remote_addr）でレート制限・ログを取り、X-Forwarded-For 詐称による
    # レート制限回避を防ぐ。前段プロキシを導入する場合のみ set_real_ip_from を限定追加すること。
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=64k flush=5s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 30;
    reset_timedout_connection on;

    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Runtime writes stay under /tmp so the gateway can run with a read-only root filesystem.
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path /tmp/nginx-proxy-temp;
    fastcgi_temp_path /tmp/nginx-fastcgi-temp;
    uwsgi_temp_path /tmp/nginx-uwsgi-temp;
    scgi_temp_path /tmp/nginx-scgi-temp;
    # max_size は tmpfs (/tmp, compose で 128m) の範囲内に収める。
    # 大きすぎる値はクライアントボディの一時ファイルと競合して ENOSPC を招く。
    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=static_cache:20m max_size=64m inactive=30d use_temp_path=off;

    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 50M;
    large_client_header_buffers 4 16k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/manifest+json
        application/xml
        application/xml+rss
        application/wasm
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    server_tokens off;
    include /etc/nginx/includes/security_headers.conf;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=300r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    limit_req_status 429;
    limit_conn_status 429;
    limit_req_log_level warn;

    include /etc/nginx/includes/upstreams.conf;
    include /etc/nginx/includes/maps.conf;
    include /etc/nginx/conf.d/*.conf;
}
