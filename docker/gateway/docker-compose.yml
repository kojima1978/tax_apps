# ============================================
# Gateway + Portal - Docker Compose
# ============================================
#
# Nginx リバースプロキシ + ポータルサイト
# 他のアプリとは独立したプロジェクトとして起動
#
# Usage:
#   起動:     docker compose up -d
#   再ビルド: docker compose up -d --build
#   ログ:     docker compose logs -f
#   停止:     docker compose down
#
# 前提:
#   docker network create tax-apps-network
#
# ============================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-autoheal-labels: &autoheal-labels
  tax-apps.autoheal: "true"

x-common: &common
  networks:
    - tax-apps-network
  restart: unless-stopped
  logging: *default-logging
  init: true
  labels: *autoheal-labels
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        memory: 256M
      reservations:
        memory: 64M

services:
  # ===========================================
  # Nginx Gateway (リバースプロキシ)
  # Port: 80
  # ===========================================
  gateway:
    <<: *common
    build:
      context: ../../nginx
    container_name: tax-apps-gateway
    entrypoint: []
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    stop_signal: SIGQUIT
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=1777
    ports:
      - "80:80"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../nginx/includes:/etc/nginx/includes:ro
      - ../../nginx/html:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================================
  # ポータルサイト (メインダッシュボード)
  # Port: 3000
  # ===========================================
  portal-app:
    <<: *common
    build:
      context: ../../apps/portal/app
      target: runner
    container_name: portal-app
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

networks:
  tax-apps-network:
    external: true
