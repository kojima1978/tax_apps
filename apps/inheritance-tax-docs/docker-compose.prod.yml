# ============================================
# 相続税申告 必要書類案内 - Production Override
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================

x-prod-deploy: &prod-deploy
  resources:
    limits:
      memory: 192M
    reservations:
      memory: 64M

services:
  inheritance-tax-docs:
    build:
      target: runner
    environment:
      TZ: Asia/Tokyo
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=128"
      DATABASE_PATH: "/app/data/resources.sqlite"
      DATA_DIR: "/app/data"
    init: false
    # !override で base の volumes を置換する（通常のリストはマージされ、
    # 開発用の ./src ./server ./public バインドが本番にも残ってしまうため）
    volumes: !override
      - inheritance_tax_docs_data:/app/data
    healthcheck:
      start_period: 10s
    deploy: *prod-deploy

volumes:
  inheritance_tax_docs_data:
    name: inheritance-tax-docs-data
