# ============================================
# 医療法人株式評価システム - Production Override
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================

x-prod-deploy: &prod-deploy
  resources:
    limits:
      memory: 192M
    reservations:
      memory: 64M

services:
  medical-stock-valuation:
    build:
      target: runner
    init: false
    volumes:
      - medical_stock_data:/app/data
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=128"
    deploy: *prod-deploy

volumes:
  medical_stock_data:
    name: medical-stock-valuation-data
