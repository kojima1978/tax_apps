server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    location /depreciation-calc {
        alias /usr/share/nginx/html/depreciation-calc;
        try_files $uri $uri/ /depreciation-calc/index.html;
    }

    location /depreciation-calc/assets {
        alias /usr/share/nginx/html/depreciation-calc/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
