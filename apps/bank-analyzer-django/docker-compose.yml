# ============================================
# 銀行取引分析ツール - Docker Compose
# ============================================
#
# Usage:
#   開発起動:     docker compose up -d
#   再ビルド:     docker compose up -d --build
#   ログ確認:     docker compose logs -f
#   停止:         docker compose down
#   テスト実行:   docker compose --profile test run --rm test
#   本番起動:     docker compose --profile production up -d bank-analyzer-prod
#
# Services:
#   - bank-analyzer-db:      PostgreSQL 16
#   - bank-analyzer-django:  Django 6.0 (dev mode, runserver)
#   - test:                  pytest テストランナー (--profile test)
#   - bank-analyzer-prod:    Gunicorn 本番サービス (--profile production)
#
# Stack: Django 6.0 / Python 3.12 / PostgreSQL 16
#        pandas / RapidFuzz / Bootstrap 5 / Plotly
#
# ============================================

# ------------------------------------------
# 共通設定（YAML anchors）
# ------------------------------------------
x-common-env: &common-env
  TZ: Asia/Tokyo

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

x-security-opts: &security-opts
  security_opt:
    - no-new-privileges:true

# ------------------------------------------
# サービス定義
# ------------------------------------------
services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  # Port: 5432 (internal only)
  #
  # 機能:
  #   - 取引データの永続化
  #
  # データ:
  #   - bank_analyzer_pgdata ボリュームに永続化
  # ===========================================
  bank-analyzer-db:
    image: postgres:16-alpine
    container_name: bank-analyzer-postgres
    environment:
      <<: *common-env
      POSTGRES_DB: bank_analyzer
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev-password-change-in-production}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - bank_analyzer_pgdata:/var/lib/postgresql/data
    networks:
      - tax-apps-network
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bank_analyzer"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ===========================================
  # 銀行取引分析ツール（Django - 開発モード）
  # ===========================================
  # Port: 3007 | Path: /bank-analyzer/
  #
  # 機能:
  #   - 銀行取引CSV/Excelの読込・分析（Case → Account → Transaction 正規化DB）
  #   - 相続税申告向け取引分類（ルールベース + RapidFuzzファジーマッチング）
  #   - インライン分類編集 + 自動保存（SaveQueue逐次処理）
  #   - カテゴリーフィルター絞り込み中の分類変更で行フェードアウト
  #   - 未分類タブ: グループ表示 / フラット表示（付箋・一括変更・パターン追加）
  #   - AI分類グループ（自動サジェスト + ワンクリック適用）
  #   - 資金移動検出（最適マッチング + 振込手数料推定）
  #   - 付箋機能（多額取引・取引一覧・未分類タブ・付箋タブ）
  #   - 分類別Excelエクスポート
  #   - PostgreSQLによるデータ永続化
  #
  # アクセス:
  #   - Nginx経由: http://localhost/bank-analyzer/
  #   - 直接:      http://localhost:3007/bank-analyzer/
  # ===========================================
  bank-analyzer-django:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        PYTHON_VERSION: "3.12"
        APP_VERSION: ${APP_VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    container_name: bank-analyzer
    depends_on:
      bank-analyzer-db:
        condition: service_healthy
    ports:
      - "3007:3007"
    volumes:
      # ソースコードをマウント（ホットリロード用）
      - ./analyzer:/app/analyzer:ro
      - ./bank_project:/app/bank_project:ro
      # ユーザー設定（分類パターン等）
      - ./data:/app/data
    environment:
      <<: *common-env
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-not-for-production}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,bank-analyzer,*
      DJANGO_FORCE_SCRIPT_NAME: /bank-analyzer
      # PostgreSQL接続設定
      DB_ENGINE: postgresql
      DB_NAME: bank_analyzer
      DB_USER: bankuser
      DB_PASSWORD: ${DB_PASSWORD:-dev-password-change-in-production}
      DB_HOST: bank-analyzer-db
      DB_PORT: "5432"
    networks:
      - tax-apps-network
    restart: unless-stopped
    logging: *default-logging
    <<: *security-opts
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:3007/health/ || exit 1"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ===========================================
  # テストランナー（オンデマンド実行）
  # ===========================================
  # Usage:
  #   docker compose run --rm test
  #   docker compose run --rm test pytest -v analyzer/tests.py
  #   docker compose run --rm test coverage run -m pytest
  #
  # 終了後自動削除（--rm相当の設定）
  # ===========================================
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    container_name: bank-analyzer-test
    depends_on:
      bank-analyzer-db:
        condition: service_healthy
    environment:
      <<: *common-env
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: test-secret-key-not-for-production
      # テスト用PostgreSQL接続
      DB_ENGINE: postgresql
      DB_NAME: bank_analyzer
      DB_USER: bankuser
      DB_PASSWORD: ${DB_PASSWORD:-dev-password-change-in-production}
      DB_HOST: bank-analyzer-db
      DB_PORT: "5432"
    networks:
      - tax-apps-network
    profiles:
      - test
    <<: *security-opts

  # ===========================================
  # 本番サービス（Gunicorn）
  # ===========================================
  # Usage:
  #   docker compose --profile production up -d bank-analyzer-prod
  #
  # 本番環境での使用を想定
  # ===========================================
  bank-analyzer-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    container_name: bank-analyzer-production
    depends_on:
      bank-analyzer-db:
        condition: service_healthy
    ports:
      - "3007:3007"
    volumes:
      # ユーザー設定のみ（ソースコードはイメージ内）
      - ./data:/app/data
    environment:
      <<: *common-env
      DJANGO_DEBUG: "False"
      DJANGO_FORCE_SCRIPT_NAME: /bank-analyzer
      # 本番環境では必ず .env で設定すること
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-CHANGE_THIS_IN_PRODUCTION}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost}
      # PostgreSQL接続設定
      DB_ENGINE: postgresql
      DB_NAME: bank_analyzer
      DB_USER: bankuser
      DB_PASSWORD: ${DB_PASSWORD:-CHANGE_THIS_IN_PRODUCTION}
      DB_HOST: bank-analyzer-db
      DB_PORT: "5432"
      # Gunicorn設定
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-300}
    networks:
      - tax-apps-network
    restart: unless-stopped
    logging: *default-logging
    <<: *security-opts
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:3007/health/ || exit 1"]
      <<: *healthcheck-defaults
    profiles:
      - production
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# ------------------------------------------
# ネットワーク定義
# ------------------------------------------
networks:
  tax-apps-network:
    external: true

# ------------------------------------------
# ボリューム定義
# ------------------------------------------
volumes:
  bank_analyzer_pgdata:
    name: bank-analyzer-postgres
