{% load static %}
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bank Analyzer{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{% static 'analyzer/css/style.css' %}" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container-fluid px-4">
            <a class="nav-link portal-link" href="/" title="ポータルに戻る">
                <i class="bi bi-house-door"></i>
            </a>
            <a class="navbar-brand" href="{% url 'case-list' %}"><i class="bi bi-bank2" aria-hidden="true"></i> Bank Analyzer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="メニューを開閉">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'case-list' %}active{% endif %}" href="{% url 'case-list' %}">
                            <i class="bi bi-folder2-open"></i> 案件一覧
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}" href="{% url 'settings' %}">
                            <i class="bi bi-gear"></i> 設定
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
        <div class="mt-4">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show glass-card border-0" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- Bulk Operation Overlay -->
    <div class="bulk-submit-overlay" id="bulkSubmitOverlay">
        <div class="bulk-submit-box">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">処理中...</span>
            </div>
            <span class="bulk-submit-text" id="bulkSubmitText">処理中...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="{% static 'analyzer/js/confirm_modal.js' %}"></script>
    <script>
    /** 一括操作フォーム送信時にオーバーレイ表示 */
    document.addEventListener('submit', function(e) {
        const form = e.target;
        if (form.classList.contains('bulk-form')) {
            const overlay = document.getElementById('bulkSubmitOverlay');
            const text = document.getElementById('bulkSubmitText');
            text.textContent = form.dataset.bulkLabel || '処理中...';
            overlay.classList.add('active');
        }
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
