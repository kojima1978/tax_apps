{% load static %}
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bank Analyzer{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{% static 'analyzer/css/style.css' %}" rel="stylesheet">
</head>

<body>
    <header class="app-header sticky-top">
        <div class="container-fluid d-flex align-items-center justify-content-between px-4" style="height: 3.5rem;">
            <!-- Left: Portal + Nav Links -->
            <div class="d-flex align-items-center gap-2">
                <a class="header-portal-link" href="/" title="ポータルに戻る">
                    <i class="bi bi-house-door"></i>
                    <span class="d-none d-md-inline">ポータル</span>
                </a>
                <a class="header-nav-link {% if request.resolver_match.url_name == 'case-list' or request.resolver_match.url_name == 'case-create' %}active{% endif %}" href="{% url 'case-list' %}">
                    <i class="bi bi-folder2-open"></i>
                    <span class="d-none d-md-inline">案件一覧</span>
                </a>
                <a class="header-nav-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}" href="{% url 'settings' %}">
                    <i class="bi bi-gear"></i>
                    <span class="d-none d-md-inline">設定</span>
                </a>
            </div>

            <!-- Right: Actions -->
            <div class="d-flex align-items-center gap-2">
                <a class="header-action-btn" href="{% url 'customer-letter' %}" target="_blank">
                    <i class="bi bi-envelope-paper"></i>
                    <span class="d-none d-sm-inline">お客様配布用文書</span>
                </a>
                <a class="header-action-btn {% if request.resolver_match.url_name == 'case-create' %}active{% endif %}" href="{% url 'case-create' %}">
                    <i class="bi bi-plus-lg"></i>
                    <span class="d-none d-sm-inline">新規案件</span>
                </a>
            </div>
        </div>
    </header>

    <div class="container mt-4">
        {% if messages %}
        <div class="mt-4">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show glass-card border-0" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- Bulk Operation Overlay -->
    <div class="bulk-submit-overlay" id="bulkSubmitOverlay">
        <div class="bulk-submit-box">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">処理中...</span>
            </div>
            <span class="bulk-submit-text" id="bulkSubmitText">処理中...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="{% static 'analyzer/js/confirm_modal.js' %}"></script>
    <script>
    /** 一括操作フォーム送信時にオーバーレイ表示 */
    document.addEventListener('submit', function(e) {
        const form = e.target;
        if (form.classList.contains('bulk-form')) {
            const overlay = document.getElementById('bulkSubmitOverlay');
            const text = document.getElementById('bulkSubmitText');
            text.textContent = form.dataset.bulkLabel || '処理中...';
            overlay.classList.add('active');
        }
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
