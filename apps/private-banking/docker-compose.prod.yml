services:
  private-banking-postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}

  private-banking-web:
    build:
      target: runner
    environment:
      NODE_ENV: production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}@private-banking-postgres:5432/${POSTGRES_DB:-private_banking}?schema=public
    # base の volumes（開発用 src バインドと .next named volume）を完全に無効化する。
    # `volumes: []` はマージされて base 側が残り、.next が本番ビルドを覆い隠すため !reset が必須。
    volumes: !reset []
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
