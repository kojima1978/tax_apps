# ============================================
# 給与・賞与 手取り計算シミュレーター - Docker Compose
# ============================================
# Usage:
#   開発:   docker compose up -d
#   再ビルド: docker compose up -d --build
#   ログ:   docker compose logs -f
#   停止:   docker compose down
# ============================================

# 共通設定
x-common-env: &common-env
  TZ: Asia/Tokyo

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 120s

services:
  # ===========================================
  # 給与・賞与 手取り計算シミュレーター
  # Port: 3016
  #
  # 機能:
  #   - 月額給与の手取り計算（社会保険料・所得税・住民税控除）
  #   - 賞与の手取り計算（社会保険料・所得税控除）
  #   - 都道府県別健康保険料率対応
  #   - 令和8年分源泉徴収税額表（電子計算機の特例）
  # ===========================================
  salary-calc:
    build:
      context: .
      dockerfile: ../../docker/Dockerfile.vite-static
      target: dev
      args:
        APP_PORT: "3016"
        APP_PATH: salary-calc
        APP_TITLE: "Salary Calculator"
        APP_DESCRIPTION: "給与・賞与 手取り計算シミュレーター"
        NPM_CACHE_ID: npm-store-salary-calc
    container_name: salary-calc
    networks:
      - tax-apps-network
    ports:
      - "3016:3016"
    volumes:
      - ./src:/app/src:ro
      - ./index.html:/app/index.html:ro
    environment:
      <<: *common-env
      NODE_ENV: development
    init: true
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3016/salary-calc/ || exit 1"]
      <<: *healthcheck-defaults
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  tax-apps-network:
    external: true
