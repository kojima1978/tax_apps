# ============================================
# 退職金税額計算シミュレーター - Production Override
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================

x-prod-deploy: &prod-deploy
  resources:
    limits:
      memory: 64M
    reservations:
      memory: 16M

services:
  retirement-tax-calc:
    build:
      target: runner
    environment:
      TZ: Asia/Tokyo
    init: false
    # `volumes: []` はマージされて base の開発用バインドが残るため !reset で無効化する
    volumes: !reset []
    healthcheck:
      start_period: 10s
    deploy: *prod-deploy
