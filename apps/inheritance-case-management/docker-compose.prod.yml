# ============================================
# 相続税案件管理 - Production Override
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================

x-prod-deploy: &prod-deploy
  resources:
    limits:
      memory: 512M
    reservations:
      memory: 128M

x-prod-db-deploy: &prod-db-deploy
  resources:
    limits:
      memory: 256M
    reservations:
      memory: 64M

services:
  postgres:
    deploy: *prod-db-deploy

  web:
    build:
      target: runner
    labels:
      tax-apps.autoheal: "true"
    init: false
    # !override で base の volumes を置換する（通常のリストはマージされ、
    # 開発用の ./web/src ./web/public ./web/prisma バインドが本番にも残ってしまうため）
    volumes: !override
      # テンプレートファイル（見積書・請求書Excel）のみマウント
      - ./templates:/app/templates:ro
    environment:
      TZ: Asia/Tokyo
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=256"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inheritance_tax_db}?schema=public
    deploy: *prod-deploy
