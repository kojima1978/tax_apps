# ============================================
# 贈与税シミュレーター - Production Override
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================

x-prod-deploy: &prod-deploy
  resources:
    limits:
      memory: 64M
    reservations:
      memory: 16M

services:
  gift-tax-simulator:
    build:
      target: runner
    init: false
    # `volumes: []` はマージされて base の開発用バインドが残るため !reset で無効化する
    volumes: !reset []
    deploy: *prod-deploy
