# ============================================
# 相続税 減価償却資産評価 - Production Override
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================

x-prod-deploy: &prod-deploy
  resources:
    limits:
      memory: 64M
    reservations:
      memory: 16M

services:
  asset-valuation:
    build:
      target: runner
    init: false
    # `volumes: []` はマージされて base の開発用バインドが残るため !reset で無効化する
    volumes: !reset []
    deploy: *prod-deploy
